<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroRoast | Cosmic Burn</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7d2ae8;
            --secondary: #00f2ff;
            --bg: #020205;
            --card-bg: rgba(10, 10, 20, 0.7);
            --error: #ff4b2b;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg); color: white;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
        }

        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 40px;
            width: 90%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative; z-index: 10; text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 8px; 
             background: linear-gradient(to right, #fff, var(--secondary));
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; }

        .subtitle { color: #888; margin-bottom: 30px; font-weight: 300; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--secondary); }

        input {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; color: white;
            font-size: 1rem; transition: 0.3s; box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--secondary); background: rgba(255,255,255,0.1); }

        .btn-launch {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        .btn-launch:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(125, 42, 232, 0.4); }
        .btn-launch:disabled { opacity: 0.5; cursor: not-allowed; }

        .roast-box {
            background: rgba(0,0,0,0.4); border-left: 4px solid var(--secondary);
            padding: 20px; margin: 20px 0; font-size: 1.1rem;
            line-height: 1.6; color: #e0e0e0; text-align: left;
            min-height: 100px;
        }

        .pulse {
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 50%; margin: 20px auto;
            animation: pulse-out 1.5s infinite;
        }

        @keyframes pulse-out { 0% { transform: scale(0.1); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>

    <div class="glass-card">
        <div id="form-view">
            <h1>AstroRoast</h1>
            <p class="subtitle">Personalized cosmic insults await.</p>
            
            <div class="input-group">
                <label>Earth Name</label>
                <input type="text" id="name" placeholder="E.g. Elon Tusk" required>
            </div>

            <div class="input-group">
                <label>Arrival Date</label>
                <input type="date" id="dob" required>
            </div>

            <div class="input-group">
                <label>Launch Pad</label>
                <input type="text" id="pob" placeholder="City of birth" required>
            </div>

            <button class="btn-launch" id="submit-btn" onclick="processRoast()">Initiate Roast</button>
        </div>

        <div id="loading-view" style="display:none;">
            <div class="pulse"></div>
            <h3>Consulting the Void...</h3>
            <p style="color: #666;">Grok is calculating your insecurities.</p>
        </div>

        <div id="result-view" style="display:none;">
            <h2 style="color:var(--secondary)">The Universe Has Spoken:</h2>
            <div class="roast-box">
                <p id="roast-text"></p>
            </div>
            <button class="btn-launch" style="background: rgba(255,255,255,0.1);" onclick="location.reload()">Back to Safety</button>
        </div>
    </div>

    <script>
        // --- BACKGROUND LOGIC ---
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        for(let i=0; i<150; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.3 });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y += s.speed; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- CORE LOGIC (The Senior Dev Way) ---
        async function processRoast() {
            const elements = {
                name: document.getElementById('name').value.trim(),
                dob: document.getElementById('dob').value,
                pob: document.getElementById('pob').value.trim(),
                form: document.getElementById('form-view'),
                loading: document.getElementById('loading-view'),
                result: document.getElementById('result-view'),
                text: document.getElementById('roast-text')
            };

            // Validation
            if (!elements.name || !elements.dob || !elements.pob) {
                alert("The stars are blind until you fill all fields.");
                return;
            }

            // UI Transition
            elements.form.style.display = 'none';
            elements.loading.style.display = 'block';

            try {
                // Pointing to your Netlify Function
                const response = await fetch('/.netlify/functions/getRoast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: elements.name,
                        dob: elements.dob,
                        pob: elements.pob
                    })
                });

                if (!response.ok) throw new Error("Cosmic connection failed.");

                const data = await response.json();

                // Success Transition
              const data = await response.json();

if (data.roast) {
    elements.loading.style.display = 'none';
    elements.result.style.display = 'block';
    elements.text.innerText = data.roast;
} else if (data.error) {
    throw new Error(data.error);
}

            } catch (error) {
                console.error("Dev Log Error:", error);
                alert("Grok is currently offline in this galaxy. Try again later.");
                elements.form.style.display = 'block';
                elements.loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroRoast | Cosmic Burn</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7d2ae8;
            --secondary: #00f2ff;
            --bg: #020205;
            --card-bg: rgba(10, 10, 20, 0.8);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg); color: white;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
        }

        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 40px;
            width: 90%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { margin: 0 0 10px; background: linear-gradient(to right, #fff, var(--secondary));
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: var(--secondary); margin-bottom: 8px; text-transform: uppercase; }

        input {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; color: white;
            font-size: 1rem; box-sizing: border-box;
        }

        .btn-launch {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; cursor: pointer; letter-spacing: 2px;
        }

        .roast-box {
            background: rgba(0,0,0,0.4); border-left: 4px solid var(--secondary);
            padding: 20px; margin: 20px 0; font-size: 1.1rem; line-height: 1.6; text-align: left;
        }

        .pulse { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; 
                 margin: 20px auto; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>

    <div class="glass-card">
        <div id="form-view">
            <h1>AstroRoast</h1>
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="userName" placeholder="Elon Tusk">
            </div>
            <div class="input-group">
                <label>Birth Date</label>
                <input type="date" id="userDob">
            </div>
            <div class="input-group">
                <label>Birth Place</label>
                <input type="text" id="userPob" placeholder="Mars Base Alpha">
            </div>
            <button class="btn-launch" onclick="initiateRoast()">GET ROASTED</button>
        </div>

        <div id="loading-view" style="display:none;">
            <div class="pulse"></div>
            <p>Consulting the Cosmic Burn Unit...</p>
        </div>

        <div id="result-view" style="display:none;">
            <h2 style="color:var(--secondary)">The Verdict:</h2>
            <div class="roast-box"><p id="roast-text"></p></div>
            <button class="btn-launch" onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        // Star Background
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        for(let i=0; i<100; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2});
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'white';
            stars.forEach(st => {
                ctx.beginPath(); ctx.arc(st.x, st.y, st.s, 0, Math.PI*2); ctx.fill();
                st.y += 0.2; if(st.y > canvas.height) st.y = 0;
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Main Logic
        async function initiateRoast() {
            const name = document.getElementById('userName').value;
            const dob = document.getElementById('userDob').value;
            const pob = document.getElementById('userPob').value;

            if(!name || !dob || !pob) return alert("Fill everything, earthling!");

            document.getElementById('form-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'block';

            try {
                const response = await fetch('/.netlify/functions/getRoast', {
                    method: 'POST',
                    body: JSON.stringify({ name, dob, pob })
                });
                const data = await response.json();
                
                if(data.roast) {
                    document.getElementById('loading-view').style.display = 'none';
                    document.getElementById('result-view').style.display = 'block';
                    document.getElementById('roast-text').innerText = data.roast;
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                alert("Error: " + err.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
